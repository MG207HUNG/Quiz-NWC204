<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCNA1 · Ôn tập ngẫu nhiên</title>
<style>
  :root{
    --ink:#0B1220;
    --ink-2:#131C2E;
    --paper:#F5F4F0;
    --card:#FFFFFF;
    --line:#E4E2DC;
    --muted:#6B7280;
    --accent:#0E8A82;
    --accent-2:#0BB3A8;
    --amber:#C9862A;
    --good:#1D8A4E;
    --good-bg:#EAF6EE;
    --bad:#C43D3D;
    --bad-bg:#FBEAEA;
    --mono: "JetBrains Mono", "SF Mono", Consolas, "Roboto Mono", monospace;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    font-family:var(--sans);
    color:var(--ink);
    line-height:1.5;
    padding-bottom:80px;
  }
  .topbar{
    background:linear-gradient(180deg, var(--ink) 0%, var(--ink-2) 100%);
    color:#EDEEF0;
    padding:22px 20px 20px;
    position:sticky; top:0; z-index:50;
    box-shadow:0 4px 18px rgba(0,0,0,0.18);
  }
  .topbar-inner{max-width:880px;margin:0 auto;}
  .brand{
    display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;
  }
  .brand .dot{color:var(--accent-2);}
  .brand h1{
    font-family:var(--mono);
    font-size:18px; letter-spacing:0.5px; margin:0; font-weight:700;
    text-transform:uppercase;
  }
  .brand .sub{color:#9AA3B2; font-size:13px; font-family:var(--mono);}
  .progress-row{
    display:flex; align-items:center; gap:14px; margin-top:14px; flex-wrap:wrap;
  }
  .progress-track{
    flex:1; min-width:140px; height:8px; background:#26314A; border-radius:8px; overflow:hidden;
  }
  .progress-fill{
    height:100%; width:0%; background:linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
    transition:width .25s ease;
  }
  .progress-label{font-family:var(--mono); font-size:13px; color:#C9D0DC; white-space:nowrap;}
  .module-badges{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}
  .module-badge{
    font-family:var(--mono); font-size:11.5px; color:#C9D0DC;
    background:#1B2740; border:1px solid #2C3A57; padding:4px 10px; border-radius:20px;
  }
  .module-badge b{color:#fff;}
 
  .wrap{max-width:880px; margin:0 auto; padding:24px 20px 0;}
 
  .toolbar{
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    margin-bottom:18px; flex-wrap:wrap;
  }
  .toolbar .hint{color:var(--muted); font-size:13.5px;}
  button{
    font-family:var(--sans); font-weight:600; font-size:14px; cursor:pointer;
    border-radius:10px; border:1px solid transparent; padding:10px 16px;
    transition:transform .08s ease, box-shadow .15s ease, background .15s ease;
  }
  button:active{transform:translateY(1px);}
  .btn-new{
    background:var(--card); color:var(--ink); border:1px solid var(--line);
  }
  .btn-new:hover{border-color:#c9c6bd;}
  .btn-submit{
    background:var(--accent); color:#fff; font-size:15px; padding:13px 22px;
  }
  .btn-submit:hover{background:#0b756e;}
  .btn-submit:disabled{opacity:.5; cursor:not-allowed;}
 
  .qcard{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:20px 22px; margin-bottom:16px; position:relative;
  }
  .qcard.unanswered-flag{border-color:#E7B65C;}
  .qhead{display:flex; gap:12px; align-items:flex-start; margin-bottom:10px;}
  .qnum{
    font-family:var(--mono); font-weight:700; color:var(--accent);
    background:#E6F4F2; border-radius:8px; padding:2px 9px; font-size:13px;
    flex-shrink:0; margin-top:2px;
  }
  .qmod{
    font-family:var(--mono); font-size:11px; color:var(--muted);
  }
  .qtext{font-size:15.5px; font-weight:600; color:var(--ink);}
  .qmulti-note{
    font-size:12.5px; color:var(--amber); font-weight:600; margin:2px 0 10px 40px;
    font-family:var(--mono);
  }
 
  .exhibit{
    background:#0F1A2B; color:#CFE8E4; font-family:var(--mono); font-size:12.6px;
    border-radius:10px; margin:10px 0 14px 0; overflow:hidden; border:1px solid #22314A;
  }
  .exhibit-chrome{
    display:flex; gap:6px; padding:8px 10px; background:#152238; border-bottom:1px solid #22314A;
  }
  .exhibit-chrome span{width:9px;height:9px;border-radius:50%; display:inline-block;}
  .exhibit-chrome span:nth-child(1){background:#E5645A;}
  .exhibit-chrome span:nth-child(2){background:#E6B450;}
  .exhibit-chrome span:nth-child(3){background:#57B76A;}
  .exhibit pre{margin:0; padding:12px 14px; white-space:pre-wrap; word-break:break-word;}
 
  .opts{list-style:none; margin:0; padding:0 0 0 40px;}
  .opt{margin:7px 0;}
  .opt label{
    display:flex; gap:10px; align-items:flex-start; padding:9px 12px; border-radius:9px;
    border:1px solid var(--line); cursor:pointer; font-size:14.5px; background:#FCFCFB;
  }
  .opt label:hover{border-color:#c9c6bd;}
  .opt input{margin-top:3px; flex-shrink:0;}
  .opt.disabled label{opacity:.45; cursor:not-allowed;}
 
  .opt.correct label{background:var(--good-bg); border-color:#B9E0C4; color:#155C36;}
  .opt.incorrect label{background:var(--bad-bg); border-color:#F0C4C4; color:#8F2A2A;}
  .opt.missed label{background:var(--good-bg); border-color:#B9E0C4; color:#155C36; box-shadow:inset 0 0 0 1px #B9E0C4;}
 
  .result-tag{
    display:none; margin:10px 0 0 40px; font-family:var(--mono); font-size:12.5px; font-weight:700; padding:5px 10px; border-radius:7px; width:fit-content;
  }
  .result-tag.show{display:block;}
  .result-tag.ok{background:var(--good-bg); color:var(--good);}
  .result-tag.no{background:var(--bad-bg); color:var(--bad);}
 
  .summary{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:26px 24px; margin-bottom:20px; text-align:center;
  }
  .summary .score{font-family:var(--mono); font-size:44px; font-weight:700; color:var(--accent);}
  .summary .pct{color:var(--muted); font-size:14px; margin-top:2px;}
  .summary .breakdown{
    display:flex; justify-content:center; gap:22px; margin-top:16px; flex-wrap:wrap;
  }
  .summary .breakdown div{font-family:var(--mono); font-size:13px; color:var(--muted);}
  .summary .breakdown b{display:block; font-size:20px; color:var(--ink); font-family:var(--sans);}
 
  .footer-bar{
    position:fixed; bottom:0; left:0; right:0; background:var(--card);
    border-top:1px solid var(--line); padding:14px 20px;
    display:flex; justify-content:center; gap:14px; box-shadow:0 -4px 16px rgba(0,0,0,0.06);
    z-index:40;
  }
  .footer-bar-inner{max-width:880px; width:100%; display:flex; justify-content:space-between; align-items:center; gap:12px;}
  .jump-hint{color:var(--muted); font-size:13px;}
 
  @media (max-width: 600px){
    .qtext{font-size:14.5px;}
    .opts{padding-left:0;}
    .qmulti-note{margin-left:0;}
    .result-tag{margin-left:0;}
    .summary .score{font-size:36px;}
  }
</style>
</head>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <h1><span class="dot">&gt;</span> CCNA1 — Ôn tập ngẫu nhiên</h1>

    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

<div class="wrap">

  </div>
 
  <div id="summaryZone"></div>
  <div id="quizZone"></div>
</div>

</div>

: "Which field in the IPv4 header is used to prevent a packet from traversing a network endlessly?", "type": "single", "nCorrect": 1, "options": [{"t": "Time-to-Live", "c": true}, {"t": "Sequence Number", "c": false}, {"t": "Acknowledgment Number", "c": false}, {"t": "Differentiated Services", "c": false}]}, {"id": 13, "module": "8-10", "origNum": 13, "exhibit": "", "q": "What is one advantage that the IPv6 simplified header offers over IPv4?", "type": "single", "nCorrect": 1, "options": [{"t": "smaller-sized header", "c": false}, {"t": "little requirement for processing checksums", "c": false}, {"t": "smaller-sized source and destination IP addresses", "c": false}, {"t": "efficient packet handling", "c": true}]}, {"id": 14, "module": "8-10", "origNum": 14, "exhibit": "", "q": "What IPv4 header field identifies the upper layer protocol carried in the packet?", "type": "single", "nCorrect": 1, "options": [{"t": "Protocol", "c": true}, {"t": "Identification", "c": false}, {"t": "Version", "c": false}, {"t": "Differentiated Services", "c": false}]}, {"id": 15, "module": "8-10", "origNum": 16, "exhibit": "", "q": "What information does the loopback test provide?", "type": "single", "nCorrect": 1, "options": [{"t": "The TCP/IP stack on the device is working correctly.", "c": true}, {"t": "The device has end-to-end connectivity.", "c": false}, {"t": "DHCP is working correctly.", "c": false}, {"t": "The Ethernet cable is working correctly.", "c": false}, {"t": "The device has the correct IP address on the network.", "c": false}]}, {"id": 16, "module": "8-10", "origNum": 17, "exhibit": "", "q": "What routing table entry has a next hop address associated with a destination network?", "type": "single", "nCorrect": 1, "options": [{"t": "directly-connected routes", "c": false}, {"t": "local routes", "c": false}, {"t": "remote routes", "c": true}, {"t": "C and L source routes", "c": false}]}, {"id": 17, "module": "8-10", "origNum": 18, "exhibit": "", "q": "How do hosts ensure that their packets are directed to the correct network destination?", "type": "single", "nCorrect": 1, "options": [{"t": "They have to keep their own local routing table that contains a route to the loopback interface, a local network route, and a remote default route.", "c": true}, {"t": "They always direct their packets to the default gateway, which will be responsible for the packet delivery.", "c": false}, {"t": "They search in their own local routing table for a route to the network destination address and pass this information to the default gateway.", "c": false}, {"t": "They send a query packet to the default gateway asking for the best route.", "c": false}]}, {"id": 18, "module": "8-10", "origNum": 19, "exhibit": "", "q": "When transporting data from real-time applications, such as streaming audio and video, which field in the IPv6 header can be used to inform the routers and switches to maintain the same path for the packets in the same conversation?", "type": "single", "nCorrect": 1, "options": [{"t": "Next Header", "c": false}, {"t": "Flow Label", "c": true}, {"t": "Traffic Class", "c": false}, {"t": "Differentiated Services", "c": false}]}, {"id": 19, "module": "8-10", "origNum": 20, "exhibit": "", "q": "What statement describes the function of the Address Resolution Protocol?", "type": "single", "nCorrect": 1, "options": [{"t": "ARP is used to discover the IP address of any host on a different network.", "c": false}, {"t": "ARP is used to discover the IP address of any host on the local network.", "c": false}, {"t": "ARP is used to discover the MAC address of any host on a different network.", "c": false}, {"t": "ARP is used to discover the MAC address of any host on the local network.", "c": true}]}, {"id": 20, "module": "8-10", "origNum": 21, "exhibit": "", "q": "Under which two circumstances will a switch flood a frame out of every port except the port that the frame was received on? (Choose two.)", "type": "multi", "nCorrect": 2, "options": [{"t": "The frame has the broadcast address as the destination address.", "c": true}, {"t": "The destination address is unknown to the switch.", "c": true}, {"t": "The source address in the frame header is the broadcast address.", "c": false}, {"t": "The source address in the frame is a multicast address.", "c": false}, {"t": "The destination address in the frame is a known unicast address.", "c": false}]}, {"id": 21, "module": "8-10", "origNum": 22, "exhibit": "", "q": "Which statement describes the treatment of ARP requests on the local link?", "type": "single", "nCorrect": 1, "options": [{"t": "They must be forwarded by all routers on the local network.", "c": false}, {"t": "They are received and processed by every device on the local network.", "c": true}, {"t": "They are dropped by all switches on the local network.", "c": false}, {"t": "They are received and processed only by the target device.", "c": false}]}, {"id": 22, "module": "8-10", "origNum": 23, "exhibit": "", "q": "Which destination address is used in an ARP request frame?", "type": "single", "nCorrect": 1, "options": [{"t": "0.0.0.0", "c": false}, {"t": "255.255.255.255", "c": false}, {"t": "FFFF.FFFF.FFFF", "c": true}, {"t": "AAAA.AAAA.AAAA", "c": false}, {"t": "the physical address of the destination host", "c": false}]}, {"id": 23, "module": "8-10", "origNum": 24, "exhibit": "", "q": "A network technician issues the arp -d * command on a PC after the router that is connected to the LAN is reconfigured. What is the result after this command is issued?", "type": "single", "nCorrect": 1, "options": [{"t": "The ARP cache is cleared.", "c": true}, {"t": "The current content of the ARP cache is displayed.", "c": false}, {"t": "The detailed information of the ARP cache is displayed.", "c": false}, {"t": "The ARP cache is synchronized with the router interface.", "c": false}]}, {"id": 24, "module": "8-10", "origNum": 26, "exhibit": "", "q": "Which two types of IPv6 messages are used in place of ARP for address re <script>
(function(){
  "use strict";
 
  var BANK = JSON.parse(document.getElementById('question-bank').textContent);
  var TOTAL = 60;
  var MODULES = ["8-10", "11-13", "14-15"];
  var MODULE_LABELS = {"8-10":"Module 8–10", "11-13":"Module 11–13", "14-15":"Module 14–15"};
 
  var byModule = {};
  MODULES.forEach(function(m){ byModule[m] = BANK.filter(function(q){ return q.module === m; }); });
 
  var quiz = [];       // the 60 selected+shuffled question objects for this attempt
  var answers = {};    // qUid -> array of selected option indices (post-shuffle indices)
  var submitted = false;
 
  function shuffle(arr){
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }
 
  // Randomly split TOTAL across the 3 modules so the mix differs every time,
  // while guaranteeing every module is represented with a reasonable amount.
  function pickModuleCounts(){
    var minEach = 15;
    var remaining = TOTAL - minEach * MODULES.length;
    var cuts = [Math.floor(Math.random() * (remaining + 1)), Math.floor(Math.random() * (remaining + 1))];
    cuts.sort(function(a,b){ return a-b; });
    var parts = [cuts[0], cuts[1]-cuts[0], remaining-cuts[1]];
    var order = shuffle([0,1,2]); // randomize which module gets which slice
    var counts = {};
    MODULES.forEach(function(m, idx){
      var slice = parts[order[idx]];
      var count = minEach + slice;
      count = Math.min(count, byModule[m].length); // never exceed what's available
      counts[m] = count;
    });
    // fix rounding/clamp drift so the total is always exactly TOTAL
    var sum = MODULES.reduce(function(s,m){ return s + counts[m]; }, 0);
    var diff = TOTAL - sum;
    var mi = 0;
    while (diff !== 0){
      var m = MODULES[mi % MODULES.length];
      if (diff > 0 && counts[m] < byModule[m].length){ counts[m]++; diff--; }
      else if (diff < 0 && counts[m] > 5){ counts[m]--; diff++; }
      mi++;
      if (mi > 100) break; // safety valve
    }
    return counts;
  }
 
  function buildQuiz(){
    var counts = pickModuleCounts();
    var picked = [];
    MODULES.forEach(function(m){
      var pool = shuffle(byModule[m]);
      picked = picked.concat(pool.slice(0, counts[m]));
    });
    picked = shuffle(picked);
 
    quiz = picked.map(function(q, idx){
      var optIdx = shuffle(q.options.map(function(o, i){ return i; }));
      var shuffledOptions = optIdx.map(function(i){ return q.options[i]; });
      return {
        uid: 'u' + idx,
        module: q.module,
        origNum: q.origNum,
        exhibit: q.exhibit,
        text: q.q,
        type: q.type,
        nCorrect: q.nCorrect,
        options: shuffledOptions // each: {t, c}
      };
    });
    answers = {};
    submitted = false;
    document.getElementById('btnSubmit').disabled = false;
    document.getElementById('footerHint').textContent = 'Trả lời hết rồi bấm nộp bài nhé.';
    renderModuleBadges(counts);
    renderQuiz();
    renderSummaryZone();
    updateProgress();
    window.scrollTo({top:0, behavior:'smooth'});
  }
 
  function renderModuleBadges(counts){
    var el = document.getElementById('moduleBadges');
    el.innerHTML = MODULES.map(function(m){
      return '<span class="module-badge">'+MODULE_LABELS[m]+': <b>'+counts[m]+'</b> câu</span>';
    }).join('');
  }
 
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
 
  function renderQuiz(){
    var html = quiz.map(function(q, i){
      var inputType = q.type === 'multi' ? 'checkbox' : 'radio';
      var noteHtml = q.type === 'multi'
        ? '<div class="qmulti-note">Chọn đúng '+q.nCorrect+' đáp án</div>'
        : '';
      var exhibitHtml = q.exhibit
        ? '<div class="exhibit"><div class="exhibit-chrome"><span></span><span></span><span></span></div><pre>'+escapeHtml(q.exhibit)+'</pre></div>'
        : '';
      var optsHtml = q.options.map(function(o, oi){
        return '<li class="opt" data-oi="'+oi+'">'+
          '<label>'+
            '<input type="'+inputType+'" name="'+q.uid+'" value="'+oi+'">'+
            '<span>'+escapeHtml(o.t)+'</span>'+
          '</label>'+
        '</li>';
      }).join('');
      return '<div class="qcard" id="card-'+q.uid+'" data-uid="'+q.uid+'">'+
        '<div class="qhead">'+
          '<span class="qnum">'+(i+1)+'</span>'+
          '<div><div class="qtext">'+escapeHtml(q.text)+'</div>'+
          '<div class="qmod">'+MODULE_LABELS[q.module]+'</div></div>'+
        '</div>'+
        exhibitHtml +
        noteHtml +
        '<ul class="opts">'+optsHtml+'</ul>'+
        '<div class="result-tag" id="tag-'+q.uid+'"></div>'+
      '</div>';
    }).join('');
    document.getElementById('quizZone').innerHTML = html;
    document.getElementById('quizZone').addEventListener('change', onOptionChange);
  }
 
  function onOptionChange(e){
    if (submitted) return;
    var input = e.target;
    if (!input || !input.name) return;
    var uid = input.name;
    var q = quiz.find(function(x){ return x.uid === uid; });
    if (!q) return;
 
    var card = document.getElementById('card-'+uid);
    var checked = Array.prototype.slice.call(card.querySelectorAll('input:checked'));
    var checkedVals = checked.map(function(c){ return parseInt(c.value, 10); });
    answers[uid] = checkedVals;
 
    if (q.type === 'multi'){
      var atLimit = checkedVals.length >= q.nCorrect;
      var allInputs = card.querySelectorAll('input[type="checkbox"]');
      allInputs.forEach(function(inp){
        var li = inp.closest('.opt');
        if (!inp.checked){
          inp.disabled = atLimit;
          li.classList.toggle('disabled', atLimit);
        } else {
          inp.disabled = false;
          li.classList.remove('disabled');
        }
      });
    }
    updateProgress();
  }
 
  function updateProgress(){
    var answeredCount = quiz.filter(function(q){
      return answers[q.uid] && answers[q.uid].length > 0;
    }).length;
    var pct = quiz.length ? Math.round(100 * answeredCount / quiz.length) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = answeredCount + ' / ' + quiz.length + ' đã trả lời';
  }
 
  function grade(){
    var correctCount = 0;
    var perModule = {};
    MODULES.forEach(function(m){ perModule[m] = {correct:0, total:0}; });
 
    quiz.forEach(function(q){
      perModule[q.module].total++;
      var sel = answers[q.uid] || [];
      var correctIdxs = [];
      q.options.forEach(function(o, oi){ if (o.c) correctIdxs.push(oi); });
      var selSet = sel.slice().sort().join(',');
      var corSet = correctIdxs.slice().sort().join(',');
      var isCorrect = sel.length > 0 && selSet === corSet;
      if (isCorrect){ correctCount++; perModule[q.module].correct++; }
 
      // visual feedback
      var card = document.getElementById('card-'+q.uid);
      var opts = card.querySelectorAll('.opt');
      opts.forEach(function(li){
        var oi = parseInt(li.getAttribute('data-oi'), 10);
        var input = li.querySelector('input');
        input.disabled = true;
        var wasSelected = sel.indexOf(oi) !== -1;
        var isCorrectOpt = q.options[oi].c;
        if (isCorrectOpt && wasSelected) li.classList.add('correct');
        else if (!isCorrectOpt && wasSelected) li.classList.add('incorrect');
        else if (isCorrectOpt && !wasSelected) li.classList.add('missed');
      });
      var tag = document.getElementById('tag-'+q.uid);
      tag.classList.add('show');
      if (isCorrect){ tag.classList.add('ok'); tag.textContent = '✓ Đúng'; }
      else { tag.classList.add('no'); tag.textContent = sel.length===0 ? '— Chưa trả lời' : '✗ Sai'; }
      if (sel.length === 0){ card.classList.add('unanswered-flag'); }
      else { card.classList.remove('unanswered-flag'); }
    });
 
    return {correctCount: correctCount, perModule: perModule};
  }
 
  function renderSummaryZone(result){
    var el = document.getElementById('summaryZone');
    if (!result){ el.innerHTML = ''; return; }
    var pct = Math.round(100 * result.correctCount / quiz.length);
    var breakdownHtml = MODULES.map(function(m){
      var pm = result.perModule[m];
      return '<div><b>'+pm.correct+'/'+pm.total+'</b>'+MODULE_LABELS[m]+'</div>';
    }).join('');
    el.innerHTML = '<div class="summary">' +
      '<div class="score">'+result.correctCount+' / '+quiz.length+'</div>' +
      '<div class="pct">Đúng '+pct+'%</div>' +
      '<div class="breakdown">'+breakdownHtml+'</div>' +
    '</div>';
  }
 
  function onSubmit(){
    if (submitted) return;
    var unanswered = quiz.filter(function(q){ return !answers[q.uid] || answers[q.uid].length === 0; });
    if (unanswered.length > 0){
      var ok = confirm('Bạn còn '+unanswered.length+' câu chưa trả lời. Vẫn nộp bài?');
      if (!ok) return;
    }
    submitted = true;
    var result = grade();
    renderSummaryZone(result);
    document.getElementById('btnSubmit').disabled = true;
    document.getElementById('footerHint').textContent = 'Đã nộp bài — bấm "Tạo đề mới" để làm lại với bộ câu khác.';
    window.scrollTo({top:0, behavior:'smooth'});
  }
 
  document.getElementById('btnNew').addEventListener('click', buildQuiz);
  document.getElementById('btnSubmit').addEventListener('click', onSubmit);
 
  buildQuiz();
})();
 
</script>
</body>
</html>
